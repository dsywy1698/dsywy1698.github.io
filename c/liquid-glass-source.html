<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>液态玻璃</title>
<style>
body{margin:0;min-height:200vh;background: url('https://plus.unsplash.com/premium_photo-1676218966210-298056b2b978?q=80&w=1223&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');}
.liquid-glass{
    position:fixed;
    top:60px;
    left:20px;
    width:320px;
    height:40px;
    border-radius:40px;
    backdrop-filter:url(#glass);
    box-shadow:#0005 0px 4px 20px;
}
</style>
</head>
<body>
<div class="liquid-glass"></div>
<svg color-interpolation-filters="sRGB" style="display:none"><defs><filter id="glass"><feGaussianBlur stdDeviation="0" result="blur"></feGaussianBlur><feImage  x="0" y="0" width="100%" height="100%" result="map" id="dynamicDispMap"></feImage><feDisplacementMap in="blur" in2="map" scale="82" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap></filter></defs></svg>
<script>
(function(){
    const gamma=2,deadzonePx=10,edge=1;
    const E=(f,l)=>{const v=new Int32Array(l),z=new Float32Array(l+1);let q=0;v[0]=0;z[0]=-1e20;z[1]=1e20;for(let i=1;i<l;i++){let s=(f[i]+i*i-(f[v[q]]+v[q]*v[q]))/(2*(i-v[q]));while(s<=z[q]){if(--q<0){q=0;s=-1e20;break}s=(f[i]+i*i-(f[v[q]]+v[q]*v[q]))/(2*(i-v[q]))}q++;v[q]=i;z[q]=s;z[q+1]=1e20}q=0;const d=new Float32Array(l);for(let i=0;i<l;i++){while(z[q+1]<i)q++;const k=i-v[q];d[i]=k*k+f[v[q]]}return d};
    const D=(x,y,w,h)=>{
        const nX=x/w,nY=y/h,cR=10,cRN=cR/Math.min(w,h);
        const e={top:{dx:0,dy:1},bottom:{dx:0,dy:-1},left:{dx:1,dy:0},right:{dx:-1,dy:0}};
        const dTL=Math.hypot(x,y),dTR=Math.hypot(w-x,y),dBL=Math.hypot(x,h-y),dBR=Math.hypot(w-x,h-y);
        const cw=d=>d<=cR?1-d/cR:0;
        const wTL=cw(dTL),wTR=cw(dTR),wBL=cw(dBL),wBR=cw(dBR);
        const ef=(d,max)=>{if(d>=cR*2)return 0;const t=Math.max(0,1-d/(cR*2));return t*t*(3-2*t)};
        let wT=ef(y,cR),wB=ef(h-y,cR),wL=ef(x,cR),wR=ef(w-x,cR);
        let tw=wTL+wTR+wBL+wBR+wT+wB+wL+wR;
        if(tw<1e-6)return{dx:0,dy:0};
        let dx=0,dy=0;
        dx+=e.top.dx*wT;
        dy+=e.top.dy*wT;
        dx+=e.bottom.dx*wB;
        dy+=e.bottom.dy*wB;
        dx+=e.left.dx*wL;
        dy+=e.left.dy*wL;
        dx+=e.right.dx*wR;
        dy+=e.right.dy*wR;
        const l=Math.hypot(dx,dy);
        if(l>1e-6){dx/=l;dy/=l}
        return{dx,dy};
    };
    function I(){
        const glass=document.querySelector('.liquid-glass');
        if(!glass)return;
        const feImg=document.getElementById('dynamicDispMap');
        const filter=document.querySelector('#glass');
        if(!feImg||!filter)return;
        let timer=null;
        const schedule=()=>{if(timer)clearTimeout(timer);timer=setTimeout(update,80)};
        const update=()=>{
            const r=glass.getBoundingClientRect();
            let w=Math.round(r.width),h=Math.round(r.height);
            if(w<=0||h<=0)return;
            let cr=0;
            try{
                const s=getComputedStyle(glass),m=s.borderRadius.match(/(\d+(?:\.\d+)?)(px|rem|em)/);
                if(m){let v=parseFloat(m[1]);const u=m[2];
                    if(u==='rem')v*=parseFloat(getComputedStyle(document.documentElement).fontSize);
                    else if(u==='em')v*=parseFloat(getComputedStyle(glass).fontSize);
                    cr=v;
                }else{const n=parseFloat(s.borderRadius);if(!isNaN(n))cr=n}
            }catch(e){cr=Math.min(w,h)*.5}
            const rad=Math.max(0,Math.min(cr,w/2,h/2));
            const cv=document.createElement('canvas');
            cv.width=w;
            cv.height=h;
            const ctx=cv.getContext('2d');
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle='white';
            let R=rad;ctx.beginPath();
            ctx.moveTo(R,0);
            ctx.lineTo(w-R,0);
            ctx.quadraticCurveTo(w,0,w,R);
            ctx.lineTo(w,h-R);
            ctx.quadraticCurveTo(w,h,w-R,h);
            ctx.lineTo(R,h);
            ctx.quadraticCurveTo(0,h,0,h-R);
            ctx.lineTo(0,R);
            ctx.quadraticCurveTo(0,0,R,0);
            ctx.closePath();
            ctx.fill();
            const idata=ctx.getImageData(0,0,w,h),data=idata.data,tot=w*h;
            const origAlpha=new Uint8Array(tot);
            for(let i=0;i<tot;i++) origAlpha[i]=data[4*i+3];
            const mask=new Uint8Array(tot),alpha=16;
            for(let i=0;i<tot;i++) mask[i]=origAlpha[i]>=alpha?1:0;
            const bnd=new Uint8Array(tot);
            for(let y=0;y<h;y++)for(let x=0;x<w;x++){
                const idx=y*w+x;if(!mask[idx]){bnd[idx]=0;continue}
                let isB=0;
                for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
                    if(dx===0&&dy===0)continue;
                    const nx=x+dx,ny=y+dy;
                    if(nx<0||ny<0||nx>=w||ny>=h){isB=1;break}
                    if(mask[ny*w+nx]===0){isB=1;break}
                }
             bnd[idx]=isB;
            }
            const INF=1e9,tmp=new Float32Array(tot);
            for(let y=0;y<h;y++){
                const row=new Float32Array(w);
                for(let x=0;x<w;x++)row[x]=bnd[y*w+x]?0:INF;
                const d1=E(row,w);
                for(let x=0;x<w;x++)tmp[y*w+x]=d1[x];
            }
            const dist=new Float32Array(tot);
            for(let x=0;x<w;x++){
                const col=new Float32Array(h);
                for(let y=0;y<h;y++)col[y]=tmp[y*w+x];
                const d1=E(col,h);
                for(let y=0;y<h;y++){const idx=y*w+x;dist[idx]=mask[idx]?Math.sqrt(d1[y]):0}
            }
            let maxD=0;for(let i=0;i<tot;i++)if(mask[i]&&dist[i]>maxD)maxD=dist[i];
            if(maxD<1e-6)maxD=1;
            const out=new ImageData(w,h),outD=out.data;
            for(let y=0;y<h;y++)for(let x=0;x<w;x++){
                const idx=y*w+x,outIdx=4*idx;
                if(!mask[idx]){
                    outD[outIdx]=127;
                    outD[outIdx+1]=127;
                    outD[outIdx+2]=0;
                    outD[outIdx+3]=255;
                    continue;
                }
                let dp=dist[idx],t;
                if(dp>=deadzonePx)t=0;else if(dp<=0)t=1;else t=1-dp/deadzonePx;
                let s=Math.pow(t,gamma);s=Math.min(1,Math.max(.02,s/(1+edge*(1-t))));
                const{dx:dx,dy:dy}=D(x,y,w,h);
                let vx=dx*s,vy=dy*s;
                if(dp>=deadzonePx-0.5){vx=vy=0;}
                else{const mix=origAlpha[idx]/255.0;vx*=mix;vy*=mix;}
                outD[outIdx]=Math.min(255,Math.max(0,Math.round(127.5+127.5*vx)));
                outD[outIdx+1]=Math.min(255,Math.max(0,Math.round(127.5+127.5*vy)));
                outD[outIdx+2]=0;
                outD[outIdx+3]=255;
            }
            const dispCv=document.createElement('canvas');
            dispCv.width=w;
            dispCv.height=h;
            dispCv.getContext('2d').putImageData(out,0,0);
            const url=dispCv.toDataURL('image/png');
            feImg.setAttribute('href',url);
            feImg.setAttribute('xlink:href',url);
            feImg.setAttribute('x','0');
            feImg.setAttribute('y','0');
            feImg.setAttribute('width',w);
            feImg.setAttribute('height',h);
            feImg.setAttribute('preserveAspectRatio','none');
            const dispMap=filter.querySelector('feDisplacementMap');
            if(dispMap&&w>0){
                let sc=82*(Math.min(w,h)/120);
                sc=Math.min(130,Math.max(45,sc));
                dispMap.setAttribute('scale',Math.floor(sc));
            }
        };
        const ro=new ResizeObserver(()=>schedule());
        ro.observe(glass);
        window.addEventListener('resize',schedule);
        window.addEventListener('load',schedule);
        requestAnimationFrame(schedule);
        schedule();
    }
    "loading"===document.readyState?document.addEventListener("DOMContentLoaded",I):I();
})();
</script>
</body>
</html>
