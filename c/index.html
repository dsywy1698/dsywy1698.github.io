<!DOCTYPE html>
<html lang="zh-CN" data-t="1" data-f="2">
<head>
    <title>标题</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta name="robots" content="noindex,nofollow"/>
    <meta name="referrer" content="no-referrer"/>
    <link rel="stylesheet" href="fa.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link rel="icon" href="image/9.webp"/>
    <link rel="stylesheet" href="style.css"/>
    <style></style>
</head>
<body>
<dialog id="password">
    <div><input placeholder="输入密码"/><button onclick="ep()" class="fa fa-arrow-right"></button></div>
    <p><strong>提示 </strong>提示文本，提示文本，提示文本，提示文本，提示文本，提示文本，提示文本，提示文本。</p>
</dialog>
<div id="loader"><div><p></p><button onclick="fo()">跳过</button></div></div>
<div id="bigger">窗口过大</div>
<div id="smaller">窗口过小</div>
<nav>
    <button onclick="showPage('HOME')"></button>
    <div>
        <button onclick="window.scrollTo(0,0)"></button>
        <button onclick="document.querySelector('nav>div:nth-of-type(2)').classList.toggle('active')" class="fa fa-navicon"></button>
        <button commandfor="setting" command="show-modal" class="fa fa-gear"></button>
        <button onclick="window.scrollTo(0,document.documentElement.scrollHeight)"></button>
    </div>
    <div><div></div><div></div></div>
</nav>
<dialog id="setting" closedby="any">
    <header>设置<button onclick="localStorage.clear();ubg();location.reload(true);">重置</button></header>
    <div>主题
        <div>
            <input type="radio" name="t" onclick="chT('1')" style="background:#dbba84" checked>
            <input type="radio" name="t" onclick="chT('2')" style="background:#eb9947">
            <input type="radio" name="t" onclick="chT('3')" style="background:#7c9eb2">
            <input type="radio" name="t" onclick="chT('4')" style="background:#b39fc6">
            <input type="radio" name="t" onclick="chT('5')" style="background:#1b5998">
        </div>
    </div>
    <div>内容过滤
        <div>
            <input type="radio" name="f" onclick="chF('0')" title="无">
            <input type="radio" name="f" onclick="chF('1')" title="松">
            <input type="radio" name="f" onclick="chF('2')" title="紧" checked>
        </div>
    </div>
    <div>背景
        <div>
            <svg onclick="cbg()" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4v12M4 10h12"/></svg>
            <svg onclick="ubg()" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5L5 15M5 5L15 15"/></svg>
        </div>
    </div>
    <div>透明<input type="range" max="1" min="0" step="0.1" id="r1"/></div>
    <div>虚化<input type="range" max="30" min="0" step="3" id="r2"/></div>
</dialog>
<main id="HOME">
<header><h1>首页</h1></header>
<p>页面开发中。</p>
</main>
<main id="EVE">
<header><h1>日志</h1></header>
<search><button onclick="hot()">热</button><input type="text" placeholder="搜索..." oninput="search()" maxlength="15" spellcheck="false"/></search>
</main>
<footer><h1>页面到底了！</h1></footer>
<script src="script.js"></script>
</body>
</html>
