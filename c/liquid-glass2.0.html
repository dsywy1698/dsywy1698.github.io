<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>液态玻璃</title>
<style>
body{margin:0;min-height:200vh;background: url('https://plus.unsplash.com/premium_photo-1676218966210-298056b2b978?q=80&w=1223&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');}
.liquid-glass{
    position:fixed;
    top:60px;
    left:20px;
    width:90%;
    height:80px;
    border-radius:40px;
    backdrop-filter:url(#glass);
    box-shadow:#0005 0px 4px 20px;
}
</style>
</head>
<body>
<div class="liquid-glass"></div>
<svg color-interpolation-filters="sRGB" style="display:none" aria-hidden="true">
    <defs>
        <filter id="glass">
            <feGaussianBlur stdDeviation="1" result="blur"/>
            <feImage id="dynamicDispMap" x="0" y="0" width="100%" height="100%" preserveAspectRatio="none" result="map" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="/>
            <feDisplacementMap in="blur" in2="map" scale="72" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        </filter>
    </defs>
</svg>
<script>
(function() {
    const gamma = 2.8;
    const deadzone = 0.45;
    const edge = 12;
    const alpha = 16;
    const aspect = 1.0;
    const eps = 0.02;
    const inward = true;
    let glassElement = null;
    let feImageElem = null;
    let filterElem = null;
    let updateTimer = null;
    function edt1d(f, len) {
        const v = new Int32Array(len);
        const z = new Float32Array(len + 1);
        let q = 0;
        v[0] = 0;
        z[0] = -1e20;
        z[1] = 1e20;
        for (let i = 1; i < len; i++) {
            let s = (f[i] + i * i - (f[v[q]] + v[q] * v[q])) / (2 * (i - v[q]));
            while (s <= z[q]) {
                if (--q < 0) { q = 0; s = -1e20; break; }
                s = (f[i] + i * i - (f[v[q]] + v[q] * v[q])) / (2 * (i - v[q]));
            }
            q++;
            v[q] = i;
            z[q] = s;
            z[q + 1] = 1e20;
        }
        q = 0;
        const d = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            while (z[q + 1] < i) q++;
            const k = i - v[q];
            d[i] = k * k + f[v[q]];
        }
        return d;
    }
    function updateLiquidGlass() {
        if (!glassElement || !feImageElem || !filterElem) return;
        const rect = glassElement.getBoundingClientRect();
        let width = Math.round(rect.width);
        let height = Math.round(rect.height);
        if (width <= 0 || height <= 0) return;
        let computedRadius = 0;
        try {
            const style = window.getComputedStyle(glassElement);
            const radiusStr = style.borderRadius;
            const match = radiusStr.match(/(\d+(?:\.\d+)?)(px|rem|em)/);
            if (match) {
                let val = parseFloat(match[1]);
                const unit = match[2];
                if (unit === 'rem') {
                    const rootFontSize = parseFloat(getComputedStyle(document.documentElement).fontSize);
                    val = val * rootFontSize;
                } else if (unit === 'em') {
                    const parentFontSize = parseFloat(getComputedStyle(glassElement).fontSize);
                    val = val * parentFontSize;
                }
                computedRadius = val;
            } else {
                const numOnly = parseFloat(radiusStr);
                if (!isNaN(numOnly)) computedRadius = numOnly;
            }
        } catch(e) {
            computedRadius = Math.min(width, height) * 0.5;
        }
        const finalRadius = Math.min(computedRadius, width / 2, height / 2);
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "white";
        let r = Math.max(0, Math.min(finalRadius, width / 2, height / 2));
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(width - r, 0);
        ctx.quadraticCurveTo(width, 0, width, r);
        ctx.lineTo(width, height - r);
        ctx.quadraticCurveTo(width, height, width - r, height);
        ctx.lineTo(r, height);
        ctx.quadraticCurveTo(0, height, 0, height - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fill();
        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        const totalPixels = width * height;
        const mask = new Uint8Array(totalPixels);
        for (let i = 0; i < totalPixels; i++) {
            mask[i] = data[4 * i + 3] >= alpha ? 1 : 0;
        }
        const boundary = new Uint8Array(totalPixels);
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                if (!mask[idx]) { boundary[idx] = 0; continue; }
                let isBoundary = 0;
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx < 0 || ny < 0 || nx >= width || ny >= height) { isBoundary = 1; break; }
                        if (mask[ny * width + nx] === 0) { isBoundary = 1; break; }
                    }
                    if (isBoundary) break;
                }
                boundary[idx] = isBoundary;
            }
        }
        const INF = 1e9;
        const tmp = new Float32Array(totalPixels);
        for (let y = 0; y < height; y++) {
            const row = new Float32Array(width);
            for (let x = 0; x < width; x++) {
                row[x] = boundary[y * width + x] ? 0 : INF;
            }
            const dist1d = edt1d(row, width);
            for (let x = 0; x < width; x++) {
                tmp[y * width + x] = dist1d[x];
            }
        }
        const dist = new Float32Array(totalPixels);
        for (let x = 0; x < width; x++) {
            const col = new Float32Array(height);
            for (let y = 0; y < height; y++) {
                col[y] = tmp[y * width + x];
            }
            const dist1d = edt1d(col, height);
            for (let y = 0; y < height; y++) {
                const idx = y * width + x;
                dist[idx] = mask[idx] ? Math.sqrt(dist1d[y]) : 0;
            }
        }
        let maxDist = 0;
        for (let i = 0; i < totalPixels; i++) {
            if (mask[i] && dist[i] > maxDist) maxDist = dist[i];
        }
        if (maxDist < 1e-6) maxDist = 1;

        let sumX = 0, sumY = 0, cnt = 0;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                if (mask[y * width + x]) {
                    sumX += x;
                    sumY += y;
                    cnt++;
                }
            }
        }
        const cx = cnt ? sumX / cnt : width * 0.5;
        const cy = cnt ? sumY / cnt : height * 0.5;
        const outImageData = new ImageData(width, height);
        const outData = outImageData.data;
        const invDeadzone = Math.max(1e-6, 1 - deadzone);
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                const outIdx = 4 * idx;
                if (!mask[idx]) {
                    outData[outIdx] = 127;
                    outData[outIdx + 1] = 127;
                    outData[outIdx + 2] = 0;
                    outData[outIdx + 3] = 255;
                    continue;
                }
                let dNorm = Math.min(1, dist[idx] / maxDist);
                let t = Math.max(0, Math.min(1, (invDeadzone - dNorm) / invDeadzone));
                let strength = Math.pow(t, gamma);
                strength = Math.min(1, Math.max(eps, strength / (1 + edge * (1 - t))));
                let dx = cx - x, dy = cy - y;
                const len = Math.hypot(dx, dy) || 1e-6;
                dx /= len;
                dy /= len;
                const finalDx = inward ? dx : -dx;
                const finalDy = inward ? dy : -dy;
                const vx = finalDx * strength;
                const vy = finalDy * strength * aspect;
                const rVal = Math.min(255, Math.max(0, Math.round(127.5 + 127.5 * vx)));
                const gVal = Math.min(255, Math.max(0, Math.round(127.5 + 127.5 * vy)));
                outData[outIdx] = rVal;
                outData[outIdx + 1] = gVal;
                outData[outIdx + 2] = 0;
                outData[outIdx + 3] = 255;
            }
        }
        const dispCanvas = document.createElement("canvas");
        dispCanvas.width = outImageData.width;
        dispCanvas.height = outImageData.height;
        dispCanvas.getContext("2d").putImageData(outImageData, 0, 0);
        const dispURL = dispCanvas.toDataURL("image/png");
        feImageElem.setAttribute("href", dispURL);
        feImageElem.setAttribute("xlink:href", dispURL);
        feImageElem.setAttribute("x", "0");
        feImageElem.setAttribute("y", "0");
        feImageElem.setAttribute("width", width);
        feImageElem.setAttribute("height", height);
        feImageElem.setAttribute("preserveAspectRatio", "none");
        const dispMapElem = filterElem.querySelector('feDisplacementMap');
        if (dispMapElem && width > 0) {
            let adjustedScale = 72 * (Math.min(width, height) / 120);
            adjustedScale = Math.min(130, Math.max(45, adjustedScale));
            dispMapElem.setAttribute("scale", Math.floor(adjustedScale));
        }
    }
    function scheduleUpdate() {
        if (updateTimer) clearTimeout(updateTimer);
        updateTimer = setTimeout(updateLiquidGlass,80);
    }
    function init() {
        glassElement = document.querySelector('.liquid-glass');
        if (!glassElement) return;
        feImageElem = document.getElementById('dynamicDispMap');
        filterElem = document.querySelector('#glass');
        if (!feImageElem || !filterElem) return;
        const resizeObserver = new ResizeObserver(() => scheduleUpdate());
        resizeObserver.observe(glassElement);
        window.addEventListener('resize', scheduleUpdate);
        window.addEventListener('load', scheduleUpdate);
        requestAnimationFrame(scheduleUpdate);
        scheduleUpdate();
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
