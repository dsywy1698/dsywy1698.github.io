<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>液态玻璃</title>
    <style>
        body{
            margin:0;
            background:url(https://plus.unsplash.com/premium_photo-1676218966210-298056b2b978?q=80&w=1223&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            height:200vh;
        }
    </style>
</head>
<body>
<svg color-interpolation-filters="sRGB" style="display:none">
    <defs>
        <filter id="glass">
            <feGaussianBlur stdDeviation="0" result="blur"></feGaussianBlur>
            <feImage id="dynamicDispMap" x="0" y="0" width="320" height="42" result="map"></feImage>
            <feDisplacementMap in="blur" in2="map" scale="82" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
        </filter>
    </defs>
</svg>
<div style="position:fixed;width:320px;height:40px;z-index:2;top:60px;left:20px;border-radius:20px;backdrop-filter:url(#glass);box-shadow:#0005 0px 4px 20px;"></div>
<script>
    (function(){
        const gamma = 3;
        const deadzone = 0.5;
        const edge = 10;
        const alpha = 16;
        const aspect = 1.0;
        const eps = 0.02;
        const inward = true;
        const GLASS_W = 320;
        const GLASS_H = 40;
        const GLASS_RADIUS = 20
        function edt1d(f, len) {
            const v = new Int32Array(len);
            const z = new Float32Array(len + 1);
            const d = new Float32Array(len);
            let q = 0;
            v[0] = 0;
            z[0] = -1e20;
            z[1] = 1e20;
            for (let i = 1; i < len; i++) {
                let s = (f[i] + i * i - (f[v[q]] + v[q] * v[q])) / (2 * (i - v[q]));
                while (s <= z[q]) {
                    if (--q < 0) { q = 0; s = -1e20; break; }
                    s = (f[i] + i * i - (f[v[q]] + v[q] * v[q])) / (2 * (i - v[q]));
                }
                q++;
                v[q] = i;
                z[q] = s;
                z[q + 1] = 1e20;
            }
            q = 0;
            for (let i = 0; i < len; i++) {
                while (z[q + 1] < i) q++;
                const k = i - v[q];
                d[i] = k * k + f[v[q]];
            }
            return d;
        }
        function generateDisplacementMapData(width, height, borderRadius) {
            const offCanvas = document.createElement("canvas");
            offCanvas.width = width;
            offCanvas.height = height;
            const offCtx = offCanvas.getContext("2d");
            offCtx.clearRect(0, 0, width, height);
            offCtx.fillStyle = "white";
            const r = Math.min(borderRadius, width / 2, height / 2);
            offCtx.beginPath();
            offCtx.moveTo(r, 0);
            offCtx.lineTo(width - r, 0);
            offCtx.quadraticCurveTo(width, 0, width, r);
            offCtx.lineTo(width, height - r);
            offCtx.quadraticCurveTo(width, height, width - r, height);
            offCtx.lineTo(r, height);
            offCtx.quadraticCurveTo(0, height, 0, height - r);
            offCtx.lineTo(0, r);
            offCtx.quadraticCurveTo(0, 0, r, 0);
            offCtx.closePath();
            offCtx.fill();
            const imgData = offCtx.getImageData(0, 0, width, height);
            const data = imgData.data;
            const totalPixels = width * height;
            const mask = new Uint8Array(totalPixels);
            const alphaThreshold = alpha;
            for (let i = 0; i < totalPixels; i++) {
                mask[i] = data[4 * i + 3] >= alphaThreshold ? 1 : 0;
            }
            const boundary = new Uint8Array(totalPixels);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (!mask[idx]) {
                        boundary[idx] = 0;
                        continue;
                    }
                    let isBoundary = 0;
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx, ny = y + dy;
                            if (nx < 0 || ny < 0 || nx >= width || ny >= height) {
                                isBoundary = 1;
                                break;
                            }
                            if (mask[ny * width + nx] === 0) {
                                isBoundary = 1;
                                break;
                            }
                        }
                        if (isBoundary) break;
                    }
                    boundary[idx] = isBoundary;
                }
            }
            const INF = 1e9;
            const tmp = new Float32Array(totalPixels);
            for (let y = 0; y < height; y++) {
                const row = new Float32Array(width);
                for (let x = 0; x < width; x++) {
                    row[x] = boundary[y * width + x] ? 0 : INF;
                }
                const dist1d = edt1d(row, width);
                for (let x = 0; x < width; x++) {
                    tmp[y * width + x] = dist1d[x];
                }
            }
            const dist = new Float32Array(totalPixels);
            for (let x = 0; x < width; x++) {
                const col = new Float32Array(height);
                for (let y = 0; y < height; y++) {
                    col[y] = tmp[y * width + x];
                }
                const dist1d = edt1d(col, height);
                for (let y = 0; y < height; y++) {
                    const idx = y * width + x;
                    dist[idx] = mask[idx] ? Math.sqrt(dist1d[y]) : 0;
                }
            }
            let maxDist = 0;
            for (let i = 0; i < totalPixels; i++) {
                if (mask[i] && dist[i] > maxDist) maxDist = dist[i];
            }
            if (maxDist < 1e-6) maxDist = 1;
            let sumX = 0, sumY = 0, cnt = 0;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (mask[y * width + x]) {
                        sumX += x;
                        sumY += y;
                        cnt++;
                    }
                }
            }
            const cx = cnt ? sumX / cnt : 0.5 * width;
            const cy = cnt ? sumY / cnt : 0.5 * height;
            const outImageData = new ImageData(width, height);
            const outData = outImageData.data;
            const gammaVal = gamma;
            const deadzoneVal = deadzone;
            const edgeVal = edge;
            const invDeadzone = Math.max(1e-6, 1 - deadzoneVal);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    const outIdx = 4 * idx;
                    if (!mask[idx]) {
                        outData[outIdx] = 127;
                        outData[outIdx + 1] = 127;
                        outData[outIdx + 2] = 0;
                        outData[outIdx + 3] = 0;
                        continue;
                    }
                    const dNorm = Math.min(1, dist[idx] / maxDist);
                    let t = Math.max(0, Math.min(1, (invDeadzone - dNorm) / invDeadzone));
                    let strength = Math.pow(t, gammaVal);
                    strength = Math.min(1, Math.max(0, strength / (1 + edgeVal * (1 - t))));
                    if (deadzoneVal === 0) strength = Math.max(eps, strength);
                    let dx = cx - x, dy = cy - y;
                    const len = Math.hypot(dx, dy) || 1e-6;
                    dx /= len;
                    dy /= len;
                    if (!inward) { dx = -dx; dy = -dy; }
                    const vx = dx * strength;
                    const vy = dy * strength * aspect;
                    const r = Math.min(255, Math.max(0, Math.round(127.5 + 127.5 * vx)));
                    const g = Math.min(255, Math.max(0, Math.round(127.5 + 127.5 * vy)));
                    outData[outIdx] = r;
                    outData[outIdx + 1] = g;
                    outData[outIdx + 2] = 0;
                    outData[outIdx + 3] = 255;
                }
            }

            return outImageData;
        }
        function displacementMapToDataURL(imageData) {
            const canvas = document.createElement("canvas");
            canvas.width = imageData.width;
            canvas.height = imageData.height;
            const ctx = canvas.getContext("2d");
            ctx.putImageData(imageData, 0, 0);
            return canvas.toDataURL("image/png");
        }
        function refreshLiquidGlassDisplacement() {
            const dispImageData = generateDisplacementMapData(GLASS_W, GLASS_H, GLASS_RADIUS);
            const dispURL = displacementMapToDataURL(dispImageData);
            const feImageElem = document.getElementById("dynamicDispMap");
            if (feImageElem) {
                feImageElem.setAttribute("href", dispURL);
                feImageElem.setAttribute("xlink:href", dispURL);
            } else {
                console.warn("未找到 id='dynamicDispMap' 的 feImage 元素，请检查 SVG 结构");
            }
        }
        window.addEventListener("DOMContentLoaded", function() {
            refreshLiquidGlassDisplacement();
        });
    })();
</script>
</body>
</html>
