<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>色卡</title>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
:root{--bg:#f5f7fa;--text:#1f2937;--transition:0.2s;}
[data-theme="dark"]{--bg:#0d1117;--text:#e6edf3;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
body{
    background:var(--bg);color:var(--text);
    min-height:100vh;padding-top:60px;line-height:1.5;
    transition:background var(--transition),color var(--transition);
}
input,textarea{
    font-size:14px;padding:8px 14px;border-radius:20px;
    border:none;outline:none;transition:var(--transition);
    background:hsl(from var(--text) h s l / 0.1);color:var(--text);
    &::placeholder{color:hsl(from var(--text) h s l / 0.5)}
}
button{border:none;cursor:pointer;transition:var(--transition);background:transparent;}
nav{
    background:color-mix(in srgb,var(--text) 20%,var(--bg) 30%);
    backdrop-filter:blur(12px);border-radius:40px;
    position:fixed;z-index:1;top:12px;right:12px;
    height:46px;padding:7px;display:flex;
    >input{width:90px;height:32px;margin-right:4px;}
    >button{
        width:32px;height:32px;font-size:14px;border-radius:30px;color:var(--text);
        &:hover{background:hsl(from var(--text) h s l / 0.1);}
    }
}
main{max-width:900px;margin:0 auto;padding:0;}
.color-group{
    >div:first-child{
        background:hsl(from var(--text) h s l / 0.05);gap:10px;
        margin:8px;padding:8px 20px 8px 10px;border-radius:25px;
        transition:var(--transition);height:50px;font-weight:600;
        display:flex;align-items:center;justify-content:space-between;
        >input{font-size:inherit;font-weight:600;border-radius:20px;width:120px;height:34px;padding:0 0 0 10px;}
        >span{cursor:text;padding-left:10px;}
        button{
            width:34px;height:34px;font-size:14px;color:var(--text);
            &:hover{opacity:0.8;}&[class="fa fa-trash"]{color:#f8717180;}
        }
    }
    >div:last-child{
        margin:8px;padding:18px 20px;border-radius:20px;
        display:flex;flex-wrap:wrap;justify-content:center;
        min-height:90px;gap:16px;transition:var(--transition);
        &.drag-over{background:hsl(from var(--text) h s l / 0.05);}
    }
}
.color-card{
    width:150px;height:130px;border-radius:16px;
    padding:12px;font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;
    &.selected{outline:2px dashed #4346ef;}
    >*{padding:4px;margin:0;}
    >.color-name{cursor:text;font-size:16px;}
    >input{
        font-size:16px;font-weight:600;
        outline:1px dashed #4346ef;color:inherit;background:#0000;
    }
    >.color-value{font-size:13px;opacity:0.8;font-weight:400;cursor:pointer;}
}
dialog{
    transform:translate(-50%,-50%);transition:var(--transition);color:var(--text);
    background:color-mix(in srgb,var(--text) 10%,var(--bg) 70%);
    width:clamp(200px,80%,600px);backdrop-filter:blur(8px);opacity:1;
    border:none;border-radius:20px;padding:28px 32px;top:50%;left:50%;
    @starting-style{opacity:0;}
    &::backdrop{
        background:#0002;backdrop-filter:blur(2px);transition:var(--transition);
        @starting-style{background:#0000;backdrop-filter:blur(0);}
    }
    h3{
        margin-bottom:18px;font-size:20px;
        >span{float:right;opacity:0.6;user-select:none;&:hover{opacity:0.8;}}
    }
    >button{
        border-radius:30px;font-size:14px;padding:8px 18px;
        background:#4346ef60;color:var(--text);width:100%;
        &:hover{background:#4346ef80;}
    }
    input{width:100%;}
    textarea{
        width:100%;height:120px;padding:12px 14px;margin:8px 0;
        font-family:consolas;resize:none;scrollbar-width:none;
        border-radius:16px;line-height:1.7;
    }
}
#toastContainer{
    background:color-mix(in srgb,var(--text) 20%,var(--bg) 30%);border-radius:12px;
    position:fixed;bottom:24px;right:24px;transform:none;padding:10px 20px;
    width:auto;top:initial;left:initial;transition:var(--transition);color:var(--text);
}
@media(width<=400px){.color-group>div:last-child{gap:8px;padding:16px 8px;}}
@media(width<=360px){.color-card{width:120px;height:120px;}}
</style>
</head>
<body>
<nav>
    <input type="text" placeholder="新颜色" maxlength="7" id="colorInput">
    <button class="fa fa-plus" id="createColorBtn"></button>
    <button class="fa fa-folder" id="createGroupBtn"></button>
    <button class="fa fa-trash" id="deleteBtn"></button>
    <button class="fa fa-moon-o" id="themeToggle"></button>
</nav>
<main id="groupsContainer"></main>
<dialog id="createGroupDialog">
    <h3>新建分组<span id="cancelCreateGroup">&times;</span></h3>
    <input type="text" id="groupNameInput" placeholder="分组名称" maxlength="10">
    <textarea id="initialColorsTextarea" placeholder="初始颜色（每行一个）&#10;格式：颜色值 颜色名"></textarea>
    <button id="confirmCreateGroup" class="primary">创建</button>
</dialog>
<dialog id="toastContainer"></dialog>
<script>
// ---- 数据 ----
let colorCards=[],colorGroups=[],selectedColorIds=new Set(),isDeleteMode=false;
let currentEditingColorId=currentEditingGroupId=draggedColorId=null;
let colorDisplayMode='hex';
const DEFAULT_GROUP_ID='__default__';
// ---- DOM refs ----
const $=s=>document.querySelector(s),
      $$=s=>document.querySelectorAll(s);
const colorInput=$('#colorInput'),
      createColorBtn=$('#createColorBtn'),
      createGroupBtn=$('#createGroupBtn'),
      deleteBtn=$('#deleteBtn'),
      groupsContainer=$('#groupsContainer'),
      toastContainer=$('#toastContainer'),
      themeToggle=$('#themeToggle');
// create group
const createGroupDialog=$('#createGroupDialog'),
      cancelCreateGroup=$('#cancelCreateGroup'),
      groupNameInput=$('#groupNameInput'),
      initialColorsTextarea=$('#initialColorsTextarea'),
      confirmCreateGroup=$('#confirmCreateGroup');
// ---- helpers ----
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const validHex=c=>/^(#[A-Fa-f0-9]{6}|#[A-Fa-f0-9]{3}|[A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(c);
const normHex=c=>{if(!c.startsWith('#'))c='#'+c;if(c.length===4)return '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];return c;};
const hex2rgb=h=>{h=h.replace('#','');let n=parseInt(h,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};};
const rgb2hsl=(r,g,b)=>{r/=255;g/=255;b/=255;let M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m,h,s,l=(M+m)/2;if(d===0)h=s=0;else{s=l>0.5?d/(2-M-m):d/(M+m);switch(M){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;}h/=6;}return{h:h*360,s:s*100,l:l*100};};
const contrast=c=>{let r=hex2rgb(c);return(r.r*299+r.g*587+r.b*114)/1000>128?'#000':'#fff';};
const formatColor=(c,mode)=>{
    let rgb=hex2rgb(c);
    if(mode==='rgb')return `rgb(${rgb.r},${rgb.g},${rgb.b})`;
    if(mode==='hsl'){let hsl=rgb2hsl(rgb.r,rgb.g,rgb.b);return `hsl(${Math.round(hsl.h)},${Math.round(hsl.s)}%,${Math.round(hsl.l)}%)`;}
    return c;
};
const save=()=>{localStorage.setItem('colorCards',JSON.stringify(colorCards));localStorage.setItem('colorGroups',JSON.stringify(colorGroups));};
const load=()=>{
    let c=localStorage.getItem('colorCards'),
        g=localStorage.getItem('colorGroups');
    if(c)colorCards=JSON.parse(c);
    if(g)colorGroups=JSON.parse(g);
    if(!colorGroups.some(g=>g.id===DEFAULT_GROUP_ID)){
        colorGroups.unshift({id:DEFAULT_GROUP_ID,name:'默认分组'});
        save();
    }
    let validIds=new Set(colorGroups.map(g=>g.id));
    colorCards.forEach(c=>{if(!c.groupId||!validIds.has(c.groupId))c.groupId=DEFAULT_GROUP_ID;});
};
const toast=(msg)=>{
    toastContainer.show();
    toastContainer.innerHTML=msg;
    setTimeout(()=>{toastContainer.close()},2000);
};
const copy=(t)=>{navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>toast('复制失败'));};
// ---- render ----
function renderGroups(){
    let html='';
    let sorted=[...colorGroups].sort((a,b)=>a.id===DEFAULT_GROUP_ID?-1:b.id===DEFAULT_GROUP_ID?1:0);
    sorted.forEach(g=>{
        let cols=colorCards.filter(c=>c.groupId===g.id);
        let cardsHtml=cols.map(c=>{
            let cls='color-card'+(selectedColorIds.has(c.id)?' selected':'');
            let tc=contrast(c.color);
            let displayVal=formatColor(c.color,colorDisplayMode);
            return `<div class="${cls}" style="background:${c.color};color:${tc}" data-color-id="${c.id}"><div class="color-name" data-cid="${c.id}">${c.name||'色卡'}</div><input type="text" value="${g.name}" data-gid="${g.id}" maxlength="10" style="display:none"><div class="color-value" data-cid="${c.id}">${displayVal}</div></div>`;
        }).join('');
        let delDisplay=g.id===DEFAULT_GROUP_ID?'none':'';
        html+=`
<div class="color-group" data-group-id="${g.id}">
    <div>
        <span data-gid="${g.id}">${g.name}</span>
        <input type="text" value="${g.name}" data-gid="${g.id}" maxlength="10" style="display:none">
        <div>
            <button class="fa fa-copy" data-gid="${g.id}"></button>
            <button class="fa fa-download" data-gid="${g.id}"></button>
            <button class="fa fa-trash" data-gid="${g.id}" style="display:${delDisplay}"></button>
        </div>
    </div>
    <div data-group-id="${g.id}">${cardsHtml}</div>
</div>`;
    });
    groupsContainer.innerHTML=html;
    // 事件绑定
    groupsContainer.querySelectorAll('.color-group').forEach(wrap=>{
        let gid=wrap.dataset.groupId;
        let g=colorGroups.find(x=>x.id===gid);
        if(!g)return;
        let head=wrap.children[0];
        let display=head.querySelector('span');
        let input=head.querySelector('input');
        let body=wrap.children[1];
        let copyBtn=head.querySelector('.fa-copy');
        let exportBtn=head.querySelector('.fa-download');
        let delBtn=head.querySelector('.fa-trash');
        let isEditing=false;
        const startEdit=()=>{
            if(isEditing)return;
            isEditing=true;
            display.style.display='none';
            input.style.display='inline-block';
            input.value=g.name;
            input.focus();
        };
        const finishEdit=(saveName=true)=>{
            if(!isEditing)return;
            isEditing=false;
            let newName=saveName?input.value.trim():g.name;
            if(saveName&&newName&&newName!==g.name){
                g.name=newName;
                display.textContent=newName;
                save();
                toast('已更新');
            }else if(saveName&&!newName){
                toast('名称不能为空');
                display.textContent=g.name;
                input.value=g.name;
            }else{
                display.textContent=g.name;
                input.value=g.name;
            }
            display.style.display='inline-block';
            input.style.display='none';
            renderGroups();
        };
        display.addEventListener('click',startEdit);
        input.addEventListener('blur',()=>finishEdit(true));
        input.addEventListener('keydown',e=>{
            if(e.key==='Enter'){e.preventDefault();input.blur();}
            if(e.key==='Escape'){e.preventDefault();finishEdit(false);}
        });
        copyBtn.addEventListener('click',e=>{e.stopPropagation();copyGroup(g.id);});
        exportBtn.addEventListener('click',e=>{e.stopPropagation();exportGroupFn(g.id);});
        delBtn.addEventListener('click',e=>{e.stopPropagation();deleteGroupFlow(g.id);});
        body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
        body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
        body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');if(draggedColorId){moveColor(draggedColorId,g.id);draggedColorId=null;}});
        body.querySelectorAll('.color-card').forEach(el=>{
            let cid=el.dataset.colorId;
            let nameEl=el.querySelector('.color-name');
            let valEl=el.querySelector('.color-value');
            let nameInput=el.querySelector('input');
            let c=colorCards.find(x=>x.id===cid);
            let isNameEditing=false;
            el.addEventListener('click',(e)=>{
                if(e.target.classList.contains('color-name')||e.target.classList.contains('color-value'))return;
                copy(valEl.textContent);
                isDeleteMode?toggleSelect(cid):null;
            });
            const startNameEdit=()=>{
                if(isNameEditing)return;
                isNameEditing=true;
                nameEl.style.display='none';
                nameInput.style.display='block';
                nameInput.value=c.name;
                nameInput.focus();
            };
            const finishNameEdit=(saveColorName=true)=>{
                if(!isNameEditing)return;
                isNameEditing=false;
                let newColorName=saveColorName?nameInput.value.trim():c.name;
                if(saveColorName&&newColorName&&newColorName!==c.name){
                    c.name=newColorName;
                    nameEl.textContent=newColorName;
                    save();
                    toast('已更新');
                }else if(saveColorName&&!newColorName){
                    toast('名称不能为空');
                    nameEl.textContent=c.name;
                    nameInput.value=c.name;
                }else{
                    nameEl.textContent=c.name;
                    nameInput.value=c.name;
                }
                nameEl.style.display='block';
                nameInput.style.display='none';
                renderGroups();
            };
            nameEl.addEventListener('click',startNameEdit);
            nameInput.addEventListener('blur',()=>finishNameEdit(true));
            nameInput.addEventListener('keydown',e=>{
                if(e.key==='Enter'){e.preventDefault();nameInput.blur();}
                if(e.key==='Escape'){e.preventDefault();finishNameEdit(false);}
            });
            // 颜色值点击切换模式
            valEl.addEventListener('click',(e)=>{
                e.stopPropagation();
                if(isDeleteMode)return;
                let modes=['hex','rgb','hsl'];
                let idx=modes.indexOf(colorDisplayMode);
                colorDisplayMode=modes[(idx+1)%modes.length];
                renderGroups();
                toast(`显示模式: ${colorDisplayMode.toUpperCase()}`);
            });
            el.draggable=true;
            el.addEventListener('dragstart',e=>{draggedColorId=cid;e.dataTransfer.setData('text/plain',cid);});
        });
    });
}
function toggleSelect(id){selectedColorIds.has(id)?selectedColorIds.delete(id):selectedColorIds.add(id);renderGroups();}
function moveColor(cid,gid){let c=colorCards.find(x=>x.id===cid);if(c){c.groupId=gid;save();renderGroups();let gn=colorGroups.find(x=>x.id===gid)?.name||'分组';toast(`已移至 ${gn}`);}}
// ---- modals helpers ----
function openDialog(d){d.showModal();}
function closeDialog(d){d.close();}
// ---- parse batch colors ----
function parseBatchColors(text){
    let lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
    let result=[];
    for(let line of lines){
        let parts=line.match(/^(\S+)\s+(.+)$/);
        let colorVal,name;
        if(parts){colorVal=parts[1].trim();name=parts[2].trim();}
        else{colorVal=line.trim();name='';}
        if(!validHex(colorVal)){toast(`格式错误`);return null;}
        result.push({color:normHex(colorVal),name:name});
    }
    return result;
}
// ---- create group ----
function createGroupFn(){
    let name=groupNameInput.value.trim();
    if(!name){toast('请输入分组名称');return;}
    let g={id:uid(),name:name};
    colorGroups.push(g);
    let text=initialColorsTextarea.value;
    let colors=[];
    if(text.trim()){
        let parsed=parseBatchColors(text);
        if(parsed===null){colorGroups.pop();return;}
        colors=parsed;
    }
    colors.forEach(v=>{colorCards.push({id:uid(),color:v.color,name:v.name,groupId:g.id});});
    save();
    renderGroups();
    groupNameInput.value='';
    initialColorsTextarea.value='';
    closeDialog(createGroupDialog);
    toast('分组创建成功');
}
// ---- copy group ----
function copyGroup(gid){
    let g=colorGroups.find(x=>x.id===gid);
    if(!g)return;
    let cols=colorCards.filter(c=>c.groupId===gid);
    if(!cols.length){toast('分组为空，无法复制');return;}
    let text=cols.map(c=>`${c.color}${c.name?' '+c.name:''}`).join('\n');
    copy(text);
}
// ---- group actions ----
function deleteGroupFlow(gid){
    if(!confirm('确定删除分组？此操作不可撤销！'))return;
    colorCards=colorCards.filter(c=>c.groupId!==gid);
    colorGroups=colorGroups.filter(g=>g.id!==gid);
    save();renderGroups();
    toast('分组已删除');
}
function exportGroupFn(gid){
    if(!gid){toast('请选择分组');return;}
    let g=colorGroups.find(x=>x.id===gid);if(!g)return;
    let cols=colorCards.filter(c=>c.groupId===g.id);
    if(!cols.length){toast('该分组无颜色可导出');return;}
    let html=`<!DOCTYPE html><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${g.name}</title><style>body{padding:16px;font-family:sans-serif;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}div{width:110px;height:110px;border-radius:16px;padding:20px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 8px #0001}b,p{margin:0;padding:0}p{font-size:13px;opacity:0.8}</style>`;
    cols.forEach(c=>{let tc=contrast(c.color);html+=`<div style="background:${c.color};color:${tc}"><b>${c.name||'色卡'}</b><p>${c.color}</p></div>`;});
    let blob=new Blob([html],{type:'text/html'}),url=URL.createObjectURL(blob);
    let a=document.createElement('a');
    a.href=url;
    a.download=`${g.name.replace(/\s+/g,'-').toLowerCase()}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    toast('导出成功');
}
// ---- theme ----
function toggleTheme(){
    let dark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',dark?'':'dark');
    themeToggle.className=dark?'fa fa-moon-o':'fa fa-sun-o';
    localStorage.setItem('theme',dark?'':'dark');
}
function loadTheme(){
    let t=localStorage.getItem('theme');
    if(t==='dark'){
        document.documentElement.setAttribute('data-theme','dark');
        themeToggle.className='fa fa-sun-o';
    }
    else{themeToggle.className='fa fa-moon-o';}
}
// ---- delete mode ----
function toggleDeleteMode(){
    isDeleteMode=!isDeleteMode;
    if(isDeleteMode){deleteBtn.classList.add('active');deleteBtn.className='fa fa-check';selectedColorIds.clear();}
    else{
        if(selectedColorIds.size){
            colorCards=colorCards.filter(c=>!selectedColorIds.has(c.id));
            selectedColorIds.clear();save();
        }
        deleteBtn.classList.remove('active');
        deleteBtn.className='fa fa-trash';
    }
    renderGroups();
}
// ---- init ----
function init(){
    load();loadTheme();renderGroups();
    createColorBtn.addEventListener('click',()=>{
        let v=colorInput.value.trim().toLowerCase();
        if(!validHex(v)){toast('请输入有效16进制颜色');return;}
        let n=normHex(v);
        if(colorCards.some(c=>c.color===n)){toast('颜色已存在');return;}
        colorCards.push({id:uid(),color:n,name:'',groupId:DEFAULT_GROUP_ID});
        save();renderGroups();colorInput.value='';toast('色卡已创建');
    });
    colorInput.addEventListener('keypress',e=>{if(e.key==='Enter')createColorBtn.click();});
    createGroupBtn.addEventListener('click',()=>{openDialog(createGroupDialog);});
    deleteBtn.addEventListener('click',toggleDeleteMode);
    themeToggle.addEventListener('click',toggleTheme);
    cancelCreateGroup.addEventListener('click',()=>closeDialog(createGroupDialog));
    confirmCreateGroup.addEventListener('click',createGroupFn);
    document.querySelectorAll('dialog').forEach(d=>d.addEventListener('click',function(e){if(e.target===this)this.close();}));
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
