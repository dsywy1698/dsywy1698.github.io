<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>自定义配色卡</title>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
:root{
    --bg:#f5f7fa;
    --text:#1f2937;
    --primary:#4f46e5;
    --shadow:0 2px 8px #0001;
    --transition:0.2s ease;
}
[data-theme="dark"]{
    --bg:#0d1117;
    --text:#e6edf3;
    --primary:#6366f1;
    --shadow:0 2px 8px #fff1;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Roboto,sans-serif;
}
body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding-top:60px;
    line-height:1.5;
    transition:background var(--transition),color var(--transition);
}
input{
    background:hsl(from var(--text) h s l / 0.1);
    border:none;
    border-radius:20px;
    padding:8px 14px;
    color:var(--text);
    outline:none;
    font-size:14px;
    transition:var(--transition);
    &:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 2px rgba(79,70,229,0.2);
    }
}
button{
    border:none;
    cursor:pointer;
    transition:var(--transition);
}
header{
    position:fixed;
    top:12px;
    right:12px;
    height:46px;
    background:hsl(from var(--text) h s l / 0.2);
    backdrop-filter:blur(12px);
    display:flex;
    padding:7px;
    box-shadow:var(--shadow);
    z-index:10;
    border-radius:40px;
    >input{
        width:100px;
        height:32px;
    }
    >button{
        height:32px;
        width:32px;
        border-radius:30px;
        font-size:14px;
        color:var(--text);
        background:transparent;
        &:hover{background:hsl(from var(--text) h s l / 0.1);}
    }
}
main{max-width:1200px;margin:0 auto;padding:0;}
.color-group{
    overflow:hidden;
    >div:first-child{
        padding:12px 20px;
        margin:8px;
        border-radius:99px;
        background:hsl(from var(--text) h s l / 0.05);
        cursor:pointer;
        transition:var(--transition);
        font-weight:600;
        &:hover{background:hsl(from var(--text) h s l / 0.1);}
    }
    >div:last-child{
        padding:18px 20px;
        margin:8px;
        border-radius:20px;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:16px;
        min-height:90px;
        transition:var(--transition);
        &.drag-over{background:hsl(from var(--primary) h s l / 0.1);}
    }
}
.color-card{
    width:150px;
    height:130px;
    border-radius:16px;
    padding:16px;
    font-weight:600;
    cursor:pointer;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    &.selected{outline:4px dotted var(--primary);}
    >div:last-child{font-size:13px;opacity:0.8;font-weight:400;}
}
dialog{
    background:hsl(from var(--bg) h s l / 0.8);
    color:var(--text);
    border:none;
    border-radius:20px;
    padding:28px 32px;
    width:clamp(200px,80%,600px);
    backdrop-filter:blur(8px);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:1;
    transition:var(--transition);
    @starting-style{opacity:0;}
    &::backdrop{
        background:#0002;
        backdrop-filter:blur(4px);
        transition:var(--transition);
        @starting-style{
            background:transparent;
            backdrop-filter:blur(0);
        }
    }
    h3{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:18px;
        >h3{font-size:20px;}
        >button{
            background:none;
            font-size:26px;
            color:hsl(from var(--text) h s l / 0.8);
            padding:0 4px;
            &:hover{color:#f87171;}
        }
    }
    >div:first-child{margin-bottom:22px;}
    >div:last-child{
        display:flex;
        justify-content:flex-end;
        gap:10px;
        flex-wrap:wrap;
        >button{
            padding:8px 18px;
            border-radius:30px;
            font-size:14px;
            color:var(--text);
            &:hover{filter:brightness(1.1);}
            &.secondary{background:hsl(from var(--text) h s l / 0.1)}
            &.primary{background:hsl(from var(--primary) h s l / 0.6)}
            &.danger{background:#f8717188}
        }
    }
}
.color-info-grid{
    margin-bottom:12px;
    background:hsl(from var(--bg) h s l / 0.5);
    padding:8px 12px;
    border-radius:20px;
    >div{text-align:center;font-family:consolas;cursor:pointer;}
}
.group-form-group{margin-bottom:18px;}
.group-form-group>label{display:block;margin-bottom:6px;font-weight:500;font-size:14px;}
.group-form-group>input{width:100%;padding:10px 16px;border-radius:30px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text);font-size:15px;outline:none;}
.group-form-group>input:focus{border-color:var(--primary);}
.initial-colors-container{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.initial-colors-container>div{display:flex;gap:8px;}
.initial-colors-container>div>input:first-child{flex:1;}
.initial-colors-container>div>input:last-child{flex:1;}
.add-color-btn{background:transparent;padding:8px;text-align:center;cursor:pointer;transition:var(--transition);color:color-mix(in srgb,var(--text) 60%,transparent);border:1px dashed rgba(255,255,255,0.1);border-radius:30px;font-size:13px;}
.add-color-btn:hover{color:var(--primary);border-color:var(--primary);}
#toastContainer{
    position:fixed;
    top:initial;
    left:initial;
    bottom:24px;
    right:24px;
    transform:none;
    border-radius:12px;
    padding:10px 20px;
    width:auto;
    background:hsl(from var(--text) h s l / 0.2);
    color:var(--text);
    transition:opacity 0.3s ease;
    &.success{border-left-color:#34d399;}
    &.error{border-left-color:#f87171;}
}
.theme-toggle{background:transparent;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:30px;transition:var(--transition);opacity:0.6;}
.theme-toggle:hover{opacity:1;background:rgba(255,255,255,0.06);}
</style>
</head>
<body>
<header>
    <input type="text" placeholder="新颜色" maxlength="7" id="colorInput">
    <button class="fa fa-plus" id="createColorBtn"></button>
    <button class="fa fa-folder" id="createGroupBtn"></button>
    <button class="fa fa-trash" id="deleteBtn"></button>
    <button class="fa fa-moon-o" id="themeToggle"></button>
</header>
<main id="groupsContainer"></main>
<dialog id="colorInfoDialog">
    <h3>颜色信息</h3>
    <div>
        <div class="color-preview" id="modalColorPreview"></div>
        <div class="color-info-grid">
            <div id="modalHex" data-target="modalHex"></div>
            <div id="modalRgb" data-target="modalRgb"></div>
            <div id="modalHsl" data-target="modalHsl"></div>
        </div>
        <input type="text" id="modalColorName" placeholder="颜色名称（可选）">
    </div>
    <div>
        <button class="secondary" id="cancelColorInfo">取消</button>
        <button class="primary" id="saveColorName">保存</button>
    </div>
</dialog>
<dialog id="createGroupDialog">
    <h3>新建分组</h3>
    <div>
        <div class="group-form-group">
            <label>分组名称</label>
            <input type="text" id="groupNameInput" placeholder="输入分组名称">
        </div>
        <div class="group-form-group">
            <label>初始颜色（可选）</label>
            <div class="initial-colors-container" id="initialColorsContainer">
                <div><input type="text" class="color-code-input" placeholder="颜色值"><input type="text" class="color-name-input" placeholder="名称（可选）"></div>
            </div>
            <div class="add-color-btn" id="addInitialColorBtn"><i class="fa fa-plus"></i> 添加颜色</div>
        </div>
    </div>
    <div>
        <button class="secondary" id="cancelCreateGroup">取消</button>
        <button class="primary" id="confirmCreateGroup">创建</button>
    </div>
</dialog>
<dialog id="editGroupDialog">
    <h3>编辑分组</h3>
    <div>
        <div class="group-form-group">
            <input type="text" id="editGroupNameInput" placeholder="分组名称">
        </div>
    </div>
    <div>
        <button class="secondary" id="cancelEditGroup">取消</button>
        <button class="primary" id="saveGroupName">保存</button>
        <button class="secondary" id="exportGroupBtn">导出</button>
        <button class="danger" id="deleteGroupBtn">删除</button>
    </div>
</dialog>
<dialog id="toastContainer"></dialog>
<script>
// ---- 数据 ----
let colorCards=[], colorGroups=[], selectedColorIds=new Set(), isDeleteMode=false;
let currentEditingColorId=null, currentEditingGroupId=null, draggedColorId=null;
const DEFAULT_GROUP_ID='__default__';
// ---- DOM refs ----
const $=s=>document.querySelector(s),
      $$=s=>document.querySelectorAll(s);
const colorInput=$('#colorInput'),
      createColorBtn=$('#createColorBtn'),
      createGroupBtn=$('#createGroupBtn'),
      deleteBtn=$('#deleteBtn'),
      groupsContainer=$('#groupsContainer'),
      toastContainer=$('#toastContainer'),
      themeToggle=$('#themeToggle');
// color info
const colorInfoDialog=$('#colorInfoDialog'),
      cancelColorInfo=$('#cancelColorInfo'),
      modalHex=$('#modalHex'),
      modalRgb=$('#modalRgb'),
      modalHsl=$('#modalHsl'),
      modalColorName=$('#modalColorName'),
      saveColorNameBtn=$('#saveColorName');
// create group
const createGroupDialog=$('#createGroupDialog'),
      closeCreateGroup=$('#closeCreateGroup'),
      cancelCreateGroup=$('#cancelCreateGroup'),
      groupNameInput=$('#groupNameInput'),
      initialColorsContainer=$('#initialColorsContainer'),
      addInitialColorBtn=$('#addInitialColorBtn'),
      confirmCreateGroup=$('#confirmCreateGroup');
// edit group
const editGroupDialog=$('#editGroupDialog'),
      closeEditGroup=$('#closeEditGroup'),
      cancelEditGroup=$('#cancelEditGroup'),
      editGroupNameInput=$('#editGroupNameInput'),
      saveGroupNameBtn=$('#saveGroupName'),
      deleteGroupBtn=$('#deleteGroupBtn'),
      exportGroupBtn=$('#exportGroupBtn');
// ---- helpers ----
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const validHex=c=>/^(#[A-Fa-f0-9]{6}|#[A-Fa-f0-9]{3}|[A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(c);
const normHex=c=>{if(!c.startsWith('#'))c='#'+c;if(c.length===4)return '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];return c;};
const hex2rgb=h=>{h=h.replace('#','');let n=parseInt(h,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};};
const rgb2hsl=(r,g,b)=>{r/=255;g/=255;b/=255;let M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m,h,s,l=(M+m)/2;if(d===0)h=s=0;else{s=l>0.5?d/(2-M-m):d/(M+m);switch(M){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;}h/=6;}return{h:h*360,s:s*100,l:l*100};};
const contrast=c=>{let r=hex2rgb(c);return(r.r*299+r.g*587+r.b*114)/1000>128?'#000':'#fff';};
const save=()=>{localStorage.setItem('colorCards',JSON.stringify(colorCards));localStorage.setItem('colorGroups',JSON.stringify(colorGroups));};
const load=()=>{
    let c=localStorage.getItem('colorCards'),g=localStorage.getItem('colorGroups');
    if(c)colorCards=JSON.parse(c);
    if(g)colorGroups=JSON.parse(g);
    if(!colorGroups.some(g=>g.id===DEFAULT_GROUP_ID)){
        colorGroups.unshift({id:DEFAULT_GROUP_ID,name:'默认分组',createdAt:new Date().toISOString()});
        save();
    }
    let validIds=new Set(colorGroups.map(g=>g.id));
    colorCards.forEach(c=>{if(!c.groupId||!validIds.has(c.groupId))c.groupId=DEFAULT_GROUP_ID;});
};
const toast=(msg,type='success')=>{
    toastContainer.show();
    toastContainer.innerHTML=msg;
    setTimeout(()=>{toastContainer.close()},2000);
};
const copy=(t)=>{navigator.clipboard.writeText(t).then(()=>toast('已复制','success')).catch(()=>toast('复制失败','error'));};
// ---- render ----
function renderGroups(){
    groupsContainer.innerHTML='';
    // 按创建顺序显示，默认分组在前
    let sorted=[...colorGroups].sort((a,b)=>a.id===DEFAULT_GROUP_ID?-1:b.id===DEFAULT_GROUP_ID?1:0);
    sorted.forEach(g=>{
        let wrap=document.createElement('div');
        wrap.className='color-group';
        wrap.dataset.groupId=g.id;
        let head=document.createElement('div');
        head.innerHTML=g.name;
        let body=document.createElement('div');
        body.dataset.groupId=g.id;
        let cols=colorCards.filter(c=>c.groupId===g.id);
        if(cols.length){cols.forEach(c=>body.appendChild(createCardEl(c)));}
        wrap.appendChild(head);wrap.appendChild(body);
        groupsContainer.appendChild(wrap);
        body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
        body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
        body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');if(draggedColorId){moveColor(draggedColorId,g.id);draggedColorId=null;}});
    });
}
function createCardEl(card){
    let el=document.createElement('div');el.className='color-card'+(selectedColorIds.has(card.id)?' selected':'');
    el.style.backgroundColor=card.color;el.style.color=contrast(card.color);
    el.innerHTML=`<div>${card.name||'色卡'}</div><div>${card.color}</div>`;
    el.dataset.colorId=card.id;
    el.addEventListener('click',()=>{isDeleteMode?toggleSelect(card.id):openColorInfo(card.id);});
    el.draggable=true;
    el.addEventListener('dragstart',e=>{draggedColorId=card.id;e.dataTransfer.setData('text/plain',card.id);});
    return el;
}
function toggleSelect(id){selectedColorIds.has(id)?selectedColorIds.delete(id):selectedColorIds.add(id);renderGroups();}
function moveColor(cid,gid){let c=colorCards.find(x=>x.id===cid);if(c){c.groupId=gid;save();renderGroups();let gn=colorGroups.find(x=>x.id===gid)?.name||'分组';toast(`已移至 ${gn}`,'success');}}
// ---- modals helpers ----
function openDialog(d){d.showModal();}
function closeDialog(d){d.close();}
// ---- color info ----
function openColorInfo(id){
    let c=colorCards.find(x=>x.id===id);if(!c)return;
    currentEditingColorId=id;
    colorInfoDialog.style.background=`linear-gradient(to bottom,${c.color} 30px,${c.color}80 120px)`;
    modalHex.textContent=c.color;
    let rgb=hex2rgb(c.color);modalRgb.textContent=`rgb(${rgb.r},${rgb.g},${rgb.b})`;
    let hsl=rgb2hsl(rgb.r,rgb.g,rgb.b);modalHsl.textContent=`hsl(${Math.round(hsl.h)},${Math.round(hsl.s)}%,${Math.round(hsl.l)}%)`;
    modalColorName.value=c.name||'';
    openDialog(colorInfoDialog);
}
function saveColorNameFn(){
    if(!currentEditingColorId)return;
    let c=colorCards.find(x=>x.id===currentEditingColorId);
    if(c){c.name=modalColorName.value.trim();save();renderGroups();closeDialog(colorInfoDialog);toast('名称已保存','success');}
}
// ---- create group ----
function createGroupFn(){
    let name=groupNameInput.value.trim();if(!name){toast('请输入分组名称','error');return;}
    let g={id:uid(),name:name,createdAt:new Date().toISOString()};
    colorGroups.push(g);
    let inputs=initialColorsContainer.querySelectorAll('.initial-color-input');
    let valid=[];
    inputs.forEach(inp=>{
        let cv=inp.querySelector('.color-code-input')?.value.trim().toLowerCase();
        let nm=inp.querySelector('.color-name-input')?.value.trim();
        if(cv&&validHex(cv))valid.push({color:normHex(cv),name:nm||''});
    });
    valid.forEach(v=>{colorCards.push({id:uid(),color:v.color,name:v.name,groupId:g.id,createdAt:new Date().toISOString()});});
    save();renderGroups();
    groupNameInput.value='';initialColorsContainer.innerHTML=`<div class="initial-color-input"><input type="text" class="color-code-input" placeholder="颜色值"><input type="text" class="color-name-input" placeholder="名称（可选）"></div>`;
    closeDialog(createGroupDialog);toast('分组创建成功','success');
}
// ---- edit group ----
function openEditGroup(gid){
    let g=colorGroups.find(x=>x.id===gid);if(!g){toast('未找到分组','error');return;}
    currentEditingGroupId=gid;editGroupNameInput.value=g.name;openDialog(editGroupDialog);editGroupNameInput.focus();
    // 默认分组不可删除
    deleteGroupBtn.style.display=gid===DEFAULT_GROUP_ID?'none':'inline-block';
}
function saveGroupNameFn(){
    if(!currentEditingGroupId)return;
    let g=colorGroups.find(x=>x.id===currentEditingGroupId);if(!g)return;
    let n=editGroupNameInput.value.trim();if(!n){toast('请输入名称','error');return;}
    g.name=n;save();renderGroups();closeDialog(editGroupDialog);toast('已更新','success');
}
function deleteGroupFlow(){
    if(!currentEditingGroupId||currentEditingGroupId===DEFAULT_GROUP_ID){toast('默认分组不可删除','error');return;}
    let gid=currentEditingGroupId;
    colorCards=colorCards.filter(c=>c.groupId!==gid);
    colorGroups=colorGroups.filter(g=>g.id!==gid);
    currentEditingGroupId=null;
    save();renderGroups();closeDialog(editGroupDialog);toast('分组已删除','success');
}
function exportGroupFn(){
    if(!currentEditingGroupId){toast('请先选择分组','error');return;}
    let g=colorGroups.find(x=>x.id===currentEditingGroupId);if(!g)return;
    let cols=colorCards.filter(c=>c.groupId===g.id);
    if(!cols.length){toast('该分组无颜色可导出','error');return;}
    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${g.name}</title><style>body{margin:0;padding:20px;font-family:sans-serif;}.wrap{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;}.card{width:130px;height:130px;border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}.nm{font-size:14px;margin-bottom:4px;}.cd{font-size:12px;font-weight:600;}</style></head><body><div class="wrap">`;
    cols.forEach(c=>{let tc=contrast(c.color);html+=`<div class="card" style="background:${c.color};color:${tc};"><div class="nm">${c.name||'色卡'}</div><div class="cd">${c.color}</div></div>`;});
    html+=`</div></body></html>`;
    let blob=new Blob([html],{type:'text/html'}), url=URL.createObjectURL(blob);
    let a=document.createElement('a');a.href=url;a.download=`色卡-${g.name.replace(/\s+/g,'-').toLowerCase()}.html`;
    document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    toast('导出成功','success');
}
// ---- theme ----
function toggleTheme(){
    let dark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',dark?'':'dark');
    themeToggle.className=dark?'fa fa-moon-o':'fa fa-sun-o';
    localStorage.setItem('theme',dark?'':'dark');
}
function loadTheme(){
    let t=localStorage.getItem('theme');
    if(t==='dark'){
        document.documentElement.setAttribute('data-theme','dark');
        themeToggle.className='fa fa-sun-o';
    }
    else{themeToggle.className='fa fa-moon-o';}
}
// ---- delete mode ----
function toggleDeleteMode(){
    isDeleteMode=!isDeleteMode;
    if(isDeleteMode){deleteBtn.classList.add('active');deleteBtn.className='fa fa-check';selectedColorIds.clear();}
    else{if(selectedColorIds.size){colorCards=colorCards.filter(c=>!selectedColorIds.has(c.id));selectedColorIds.clear();save();}deleteBtn.classList.remove('active');deleteBtn.className='fa fa-trash';}
    renderGroups();
}
// ---- init ----
function init(){
    load();loadTheme();renderGroups();
    // events
    createColorBtn.addEventListener('click',()=>{
        let v=colorInput.value.trim().toLowerCase();
        if(!validHex(v)){toast('请输入有效16进制颜色','error');return;}
        let n=normHex(v);
        if(colorCards.some(c=>c.color===n)){toast('颜色已存在','error');return;}
        colorCards.push({id:uid(),color:n,name:'',groupId:DEFAULT_GROUP_ID,createdAt:new Date().toISOString()});
        save();renderGroups();colorInput.value='';toast('色卡已创建','success');
    });
    colorInput.addEventListener('keypress',e=>{if(e.key==='Enter')createColorBtn.click();});
    createGroupBtn.addEventListener('click',()=>{openDialog(createGroupDialog);});
    deleteBtn.addEventListener('click',toggleDeleteMode);
    themeToggle.addEventListener('click',toggleTheme);
    // color info
    cancelColorInfo.addEventListener('click',()=>closeDialog(colorInfoDialog));
    saveColorNameBtn.addEventListener('click',saveColorNameFn);
    document.querySelectorAll('#colorInfoDialog span').forEach(b=>b.addEventListener('click',function(){let t=document.getElementById(this.dataset.target);if(t)copy(t.textContent);}));
    // create group
    cancelCreateGroup.addEventListener('click',()=>closeDialog(createGroupDialog));
    confirmCreateGroup.addEventListener('click',createGroupFn);
    addInitialColorBtn.addEventListener('click',()=>{
        let d=document.createElement('div');d.className='initial-color-input';
        d.innerHTML='<input type="text" class="color-code-input" placeholder="颜色值"><input type="text" class="color-name-input" placeholder="名称（可选）">';
        initialColorsContainer.appendChild(d);d.querySelector('.color-code-input').focus();
    });
    // edit group
    cancelEditGroup.addEventListener('click',()=>{closeDialog(editGroupDialog);currentEditingGroupId=null;});
    saveGroupNameBtn.addEventListener('click',saveGroupNameFn);
    deleteGroupBtn.addEventListener('click',deleteGroupFlow);
    exportGroupBtn.addEventListener('click',exportGroupFn);
    // group edit trigger (delegation)
    groupsContainer.addEventListener('click',e=>{
        let btn=e.target.closest('[data-action="editGroup"]');
        if(btn){e.preventDefault();let gid=btn.dataset.gid;if(gid)openEditGroup(gid);}
        let head=e.target.closest('.color-group>div:first-child');
        if(head&&!e.target.closest('button')){let gid=head.parentElement?.dataset.groupId;if(gid)openEditGroup(gid);}
    });
    // close dialogs on backdrop click
    document.querySelectorAll('dialog').forEach(d=>d.addEventListener('click',function(e){if(e.target===this)this.close();}));
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
